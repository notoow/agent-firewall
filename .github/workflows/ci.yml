name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check project version
        run: python scripts/check_version.py

      - name: Run tests
        run: python -m pytest

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

  dogfood-action:
    name: Dogfood GitHub Action
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Scan safe example
        uses: ./
        with:
          input: examples/safe-agent-session.json
          fail-on: block
          format: sarif
          output: agent-firewall.sarif

      - name: Verify SARIF output
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("agent-firewall.sarif").read_text(encoding="utf-8"))
          assert report["version"] == "2.1.0"
          assert report["runs"][0]["tool"]["driver"]["name"] == "AgentFirewall"
          PY
